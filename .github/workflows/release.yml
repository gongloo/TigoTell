name: Auto Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - View platformio.ini
        run: cat platformio.ini

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(cat version)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version is $VERSION"

      - name: Check if release exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ env.ACT }}" == "true" ]; then
            echo "Running locally via act, skipping remote check."
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          elif gh release view "v${{ steps.get_version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "Release v${{ steps.get_version.outputs.VERSION }} already exists."
            echo "EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check_release.outputs.EXISTS == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PlatformIO
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Copy platformio_upload.ini
        if: steps.check_release.outputs.EXISTS == 'false'
        run: cp platformio_upload.example.ini platformio_upload.ini

      - name: Build Firmware
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          pio pkg install -e esp32-s3-devkitm-1
          pio run --target clean -e esp32-s3-devkitm-1
          pio run -e esp32-s3-devkitm-1
          pio run --target buildfs -e esp32-s3-devkitm-1

      - name: Create Release and Upload Artifact
        if: steps.check_release.outputs.EXISTS == 'false' && !env.ACT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.get_version.outputs.VERSION }}" \
            .pio/build/esp32-s3-devkitm-1/firmware.bin \
            .pio/build/esp32-s3-devkitm-1/littlefs.bin \
            --title "Release v${{ steps.get_version.outputs.VERSION }}" \
            --generate-notes
