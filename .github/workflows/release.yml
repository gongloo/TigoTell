name: Auto Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - View platformio.ini
        run: cat platformio.ini

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(cat version)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version is $VERSION"

      - name: Check if release exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$ACT" == "true" ]; then
            echo "Running locally via act, skipping remote check."
            echo "EXISTS=false" >> $GITHUB_OUTPUT
            echo "IS_ACT=true" >> $GITHUB_OUTPUT
          elif gh release view "v${{ steps.get_version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "Release v${{ steps.get_version.outputs.VERSION }} already exists."
            echo "EXISTS=true" >> $GITHUB_OUTPUT
            echo "IS_ACT=false" >> $GITHUB_OUTPUT
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
            echo "IS_ACT=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check_release.outputs.EXISTS == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PlatformIO
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio esptool

      - name: Copy platformio_upload.ini
        if: steps.check_release.outputs.EXISTS == 'false'
        run: cp platformio_upload.example.ini platformio_upload.ini

      - name: Build Firmware
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          pio pkg install -e esp32-s3-devkitm-1
          pio run -e esp32-s3-devkitm-1
          pio run --target buildfs -e esp32-s3-devkitm-1

      - name: Prepare Release Assets
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          BUILD_DIR=".pio/build/esp32-s3-devkitm-1"

          # Find system binaries and tools
          BOOT_APP0=$(find ~/.platformio/packages -name boot_app0.bin | head -n 1)
          GEN_PART=$(find ~/.platformio/packages -name gen_esp32part.py | head -n 1)

          # Copy boot_app0 for merging
          cp "$BOOT_APP0" "$BUILD_DIR/boot_app0.bin"

          # Extract offsets from the partition table
          python3 "$GEN_PART" "$BUILD_DIR/partitions.bin" > partitions.txt
          cat partitions.txt

          OTA_OFFSET=$(grep "otadata" partitions.txt | awk -F',' '{print $4}' | xargs)
          APP0_OFFSET=$(grep "app0" partitions.txt | awk -F',' '{print $4}' | xargs)
          LFS_OFFSET=$(grep -E "spiffs|littlefs" partitions.txt | awk -F',' '{print $4}' | xargs)

          echo "Detected Offsets - OTA: $OTA_OFFSET, App0: $APP0_OFFSET, LittleFS: $LFS_OFFSET"

          # Create a single merged factory binary
          # Note: Bootloader is at 0x0 for ESP32-S3, Partitions at 0x8000
          python3 -m esptool --chip esp32s3 merge_bin \
            -o "$BUILD_DIR/tigotell-factory.bin" \
            --flash-mode dio \
            --flash-size 16MB \
            0x0000 "$BUILD_DIR/bootloader.bin" \
            0x8000 "$BUILD_DIR/partitions.bin" \
            "$OTA_OFFSET" "$BUILD_DIR/boot_app0.bin" \
            "$APP0_OFFSET" "$BUILD_DIR/firmware.bin" \
            "$LFS_OFFSET" "$BUILD_DIR/littlefs.bin"
            
          # Generate manifest.json for ESP Web Tools
          cat <<EOF > "$BUILD_DIR/manifest.json"
          {
            "name": "TigoTell",
            "version": "${{ steps.get_version.outputs.VERSION }}",
            "new_install_prompt_erase": true,
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "parts": [
                  { "path": "tigotell-factory.bin", "offset": 0 }
                ]
              }
            ]
          }
          EOF

      - name: Create Release and Upload Assets
        if: steps.check_release.outputs.EXISTS == 'false' && steps.check_release.outputs.IS_ACT == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILD_DIR=".pio/build/esp32-s3-devkitm-1"
          gh release create "v${{ steps.get_version.outputs.VERSION }}" \
            "$BUILD_DIR/firmware.bin" \
            "$BUILD_DIR/littlefs.bin" \
            "$BUILD_DIR/tigotell-factory.bin" \
            "$BUILD_DIR/manifest.json" \
            --title "Release v${{ steps.get_version.outputs.VERSION }}" \
            --generate-notes
